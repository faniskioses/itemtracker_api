
services:
    db:
        image: mysql:8
        container_name: itemtracker-db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: itemtracker
            MYSQL_USER: user
            MYSQL_PASSWORD: userpassword
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql
    
    api:
        build: .
        container_name: itemtracker-api
        restart: always
        ports:
            - "8000:8000"
        env_file:
            - .env
        depends_on:
            - db


volumes:
    db_data: